<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="課程總覽">
    <title>補習班課程追蹤器 Pro</title>
    <style>
        :root {
            --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #ffffff; --text-sub: #b3b3b3;
            --accent: #0a84ff; --accent-hover: #006ee6; --danger: #ff453a; --success: #30d158;
            --warning: #ffd60a;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; padding-top: 40px; padding-bottom: 50px; }
        h1, h2, h3 { margin-top: 0; }
        .card { background-color: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .course-card { cursor: pointer; transition: transform 0.2s; border: 1px solid #333; }
        .course-card:active { transform: scale(0.98); }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .row-col { display: flex; flex-direction: column; width: 48%; }
        label { font-size: 14px; color: var(--text-sub); margin-bottom: 5px; }
        input[type="text"], input[type="number"], input[type="date"] { 
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; 
            background-color: #2c2c2c; color: white; font-size: 16px; 
        }
        button { 
            width: 100%; padding: 15px; border: none; border-radius: 12px; 
            background-color: var(--accent); color: white; font-size: 16px; font-weight: bold; 
            cursor: pointer; margin-top: 10px;
        }
        button:active { background-color: var(--accent-hover); }
        .btn-small { padding: 10px; width: 48%; margin-top: 0; }
        .btn-danger { background-color: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-back { background-color: #333; color: white; margin-bottom: 20px; width: auto; padding: 8px 15px; border-radius: 20px; font-size: 14px;}
        
        /* 進度條 */
        .progress-container { width: 100%; background-color: #333; border-radius: 10px; height: 12px; overflow: hidden; margin: 10px 0; }
        .progress-bar { height: 100%; background-color: var(--success); width: 0%; transition: width 0.3s ease; }
        .progress-text { font-size: 14px; color: var(--text-sub); text-align: right; }
        
        /* 排程區塊 */
        .schedule-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-bottom: 15px; }
        .day-col { display: flex; flex-direction: column; align-items: center; }
        .day-label { font-size: 12px; color: var(--text-sub); margin-bottom: 5px; }
        .day-input { width: 100%; text-align: center; padding: 8px 0; }
        
        .result-box { background-color: rgba(10, 132, 255, 0.1); border: 1px solid var(--accent); padding: 15px; border-radius: 12px; margin-top: 15px; font-size: 15px; line-height: 1.5; }
        .highlight { color: var(--accent); font-weight: bold; font-size: 18px;}
        .hidden { display: none !important; }
        
        .tabs { display: flex; margin-bottom: 15px; background: #333; border-radius: 10px; padding: 3px; }
        .tab { flex: 1; text-align: center; padding: 8px; border-radius: 8px; font-size: 14px; color: var(--text-sub); cursor: pointer; }
        .tab.active { background: var(--card-bg); color: var(--text-main); font-weight: bold; }

        #todayTasks { border-left: 4px solid var(--warning); }
        .task-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; }
        .task-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <div id="viewOverview">
        <h2>📊 學習進度總覽</h2>
        
        <div class="card" id="todayTasks">
            <h3 style="color: var(--warning); margin-bottom: 10px;">📅 今日應看進度</h3>
            <div id="todayTaskList">
                </div>
        </div>

        <div id="courseList">
            </div>

        <button onclick="createNewCourse()">➕ 新增課程</button>
    </div>

    <div id="viewDetail" class="hidden">
        <button class="btn-back" onclick="goBack()">🔙 返回總覽</button>
        
        <div class="card">
            <input type="text" id="courseName" placeholder="輸入課程名稱 (例如: 微積分)" style="font-size: 20px; font-weight: bold; margin-bottom: 15px; background: transparent; border: none; border-bottom: 2px solid #333; border-radius: 0; padding-left: 0;" onchange="saveCurrentCourse()">
            
            <div class="row">
                <div class="row-col">
                    <label>總集數</label>
                    <input type="number" id="totalEps" placeholder="例如: 50" onchange="saveCurrentCourse()">
                </div>
                <div class="row-col">
                    <label>每集時長 (分鐘)</label>
                    <input type="number" id="epDuration" placeholder="例如: 45" onchange="saveCurrentCourse()">
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <label>目前已看</label>
                <div style="font-size: 36px; font-weight: bold;">
                    <span id="currentEp">0</span> / <span id="displayTotal">0</span>
                </div>
            </div>

            <div class="progress-container" style="height: 20px;">
                <div class="progress-bar" id="detailProgressBar"></div>
            </div>
            <div class="progress-text" id="detailProgressPercent" style="text-align: center; font-size: 18px; font-weight: bold; color: var(--success);">0%</div>

            <div class="row" style="margin-top: 20px;">
                <button class="btn-small btn-danger" onclick="changeEp(-1)">-1 退回</button>
                <button class="btn-small" onclick="changeEp(1)" style="background-color: var(--success);">+1 記錄</button>
            </div>
        </div>

        <div class="card">
            <h3>📅 讀書計畫規劃</h3>
            <div class="tabs">
                <div class="tab active" onclick="switchTab('weekly')">固定每週排程</div>
                <div class="tab" onclick="switchTab('deadline')">目標日期規劃</div>
            </div>

            <div id="weeklyPlan">
                <label>設定每週各天要看幾集：</label>
                <div class="schedule-grid" style="margin-top: 10px;">
                    <div class="day-col"><div class="day-label">一</div><input type="number" id="w1" class="day-input" onchange="saveCurrentCourse()"></div>
                    <div class="day-col"><div class="day-label">二</div><input type="number" id="w2" class="day-input" onchange="saveCurrentCourse()"></div>
                    <div class="day-col"><div class="day-label">三</div><input type="number" id="w3" class="day-input" onchange="saveCurrentCourse()"></div>
                    <div class="day-col"><div class="day-label">四</div><input type="number" id="w4" class="day-input" onchange="saveCurrentCourse()"></div>
                    <div class="day-col"><div class="day-label">五</div><input type="number" id="w5" class="day-input" onchange="saveCurrentCourse()"></div>
                    <div class="day-col"><div class="day-label">六</div><input type="number" id="w6" class="day-input" onchange="saveCurrentCourse()"></div>
                    <div class="day-col"><div class="day-label">日</div><input type="number" id="w0" class="day-input" onchange="saveCurrentCourse()"></div>
                </div>
                <div class="result-box" id="weeklyResult"></div>
            </div>

            <div id="deadlinePlan" class="hidden">
                <label>我想在這一天前全部看完：</label>
                <input type="date" id="deadlineDate" style="margin-top: 5px;" onchange="saveCurrentCourse()">
                <div class="result-box hidden" id="deadlineResult"></div>
            </div>
        </div>

        <button class="btn-danger" style="margin-top: 30px;" onclick="deleteCourse()">🗑️ 刪除此課程</button>
    </div>

<script>
    // 資料庫
    let courses = [];
    let currentId = null;

    // 初始化
    function init() {
        const saved = localStorage.getItem('multiCourseData');
        if (saved) {
            courses = JSON.parse(saved);
        } else {
            // 如果是第一次用，或是從舊版升級，給一個預設課程
            courses = [];
        }
        renderOverview();
    }

    // 儲存到 LocalStorage
    function saveAll() {
        localStorage.setItem('multiCourseData', JSON.stringify(courses));
    }
