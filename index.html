<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="課程追蹤">
    <title>補習班課程追蹤器</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent: #0a84ff;
            --accent-hover: #006ee6;
            --danger: #ff453a;
            --success: #30d158;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; padding-top: 50px; padding-bottom: 50px; }
        h1, h2, h3 { margin-top: 0; }
        .card { background-color: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .row-col { display: flex; flex-direction: column; width: 48%; }
        label { font-size: 14px; color: var(--text-sub); margin-bottom: 5px; }
        input[type="number"], input[type="date"] { 
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; 
            background-color: #2c2c2c; color: white; font-size: 16px; 
        }
        button { 
            width: 100%; padding: 15px; border: none; border-radius: 12px; 
            background-color: var(--accent); color: white; font-size: 18px; font-weight: bold; 
            cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        button:active { transform: scale(0.98); background-color: var(--accent-hover); }
        .btn-small { padding: 10px; font-size: 16px; width: 48%; margin-top: 0; }
        .btn-danger { background-color: #333; color: var(--danger); border: 1px solid var(--danger); }
        
        /* 進度條 */
        .progress-container { width: 100%; background-color: #333; border-radius: 10px; height: 20px; overflow: hidden; margin: 15px 0; }
        .progress-bar { height: 100%; background-color: var(--success); width: 0%; transition: width 0.5s ease; }
        .progress-text { text-align: center; font-size: 24px; font-weight: bold; color: var(--success); }
        
        /* 排程區塊 */
        .schedule-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-bottom: 15px; }
        .day-col { display: flex; flex-direction: column; align-items: center; }
        .day-label { font-size: 12px; color: var(--text-sub); margin-bottom: 5px; }
        .day-input { width: 100%; text-align: center; padding: 8px 0; }
        
        .result-box { background-color: rgba(10, 132, 255, 0.1); border: 1px solid var(--accent); padding: 15px; border-radius: 12px; margin-top: 15px; font-size: 15px; line-height: 1.5; }
        .highlight { color: var(--accent); font-weight: bold; font-size: 18px;}
        .hidden { display: none; }
        
        /* 頁籤切換 */
        .tabs { display: flex; margin-bottom: 15px; background: #333; border-radius: 10px; padding: 3px; }
        .tab { flex: 1; text-align: center; padding: 8px; border-radius: 8px; font-size: 14px; color: var(--text-sub); cursor: pointer; }
        .tab.active { background: var(--card-bg); color: var(--text-main); font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">📚 課程進度追蹤</h2>

    <div class="card">
        <div class="row">
            <div class="row-col">
                <label>總集數</label>
                <input type="number" id="totalEps" placeholder="例如: 50" onchange="saveData()">
            </div>
            <div class="row-col">
                <label>每集時長 (分鐘)</label>
                <input type="number" id="epDuration" placeholder="例如: 45" onchange="saveData()">
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 20px;">
            <label>目前已看</label>
            <div style="font-size: 36px; font-weight: bold;">
                <span id="currentEp" style="color: var(--text-main);">0</span> / <span id="displayTotal">0</span>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressPercent">0%</div>

        <div class="row" style="margin-top: 20px;">
            <button class="btn-small btn-danger" onclick="changeEp(-1)">-1 退回</button>
            <button class="btn-small" onclick="changeEp(1)" style="background-color: var(--success);">+1 記錄</button>
        </div>
    </div>

    <div class="card">
        <h3>📅 讀書計畫規劃</h3>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('weekly')">固定每週排程</div>
            <div class="tab" onclick="switchTab('deadline')">目標日期規劃</div>
        </div>

        <div id="weeklyPlan">
            <label>設定每週各天要看幾集：</label>
            <div class="schedule-grid" style="margin-top: 10px;">
                <div class="day-col"><div class="day-label">一</div><input type="number" id="w1" class="day-input" value="0" onchange="saveData(); calcWeekly()"></div>
                <div class="day-col"><div class="day-label">二</div><input type="number" id="w2" class="day-input" value="0" onchange="saveData(); calcWeekly()"></div>
                <div class="day-col"><div class="day-label">三</div><input type="number" id="w3" class="day-input" value="0" onchange="saveData(); calcWeekly()"></div>
                <div class="day-col"><div class="day-label">四</div><input type="number" id="w4" class="day-input" value="0" onchange="saveData(); calcWeekly()"></div>
                <div class="day-col"><div class="day-label">五</div><input type="number" id="w5" class="day-input" value="0" onchange="saveData(); calcWeekly()"></div>
                <div class="day-col"><div class="day-label">六</div><input type="number" id="w6" class="day-input" value="0" onchange="saveData(); calcWeekly()"></div>
                <div class="day-col"><div class="day-label">日</div><input type="number" id="w0" class="day-input" value="0" onchange="saveData(); calcWeekly()"></div>
            </div>
            <div class="result-box" id="weeklyResult">請設定上方的每週目標！</div>
        </div>

        <div id="deadlinePlan" class="hidden">
            <label>我想在這一天前全部看完：</label>
            <input type="date" id="deadlineDate" style="margin-top: 5px;" onchange="saveData(); calcDeadline()">
            <div class="result-box hidden" id="deadlineResult"></div>
        </div>
    </div>

<script>
    // 預設資料結構
    let data = {
        totalEps: 0, epDuration: 0, currentEp: 0,
        schedule: { w0:0, w1:0, w2:0, w3:0, w4:0, w5:0, w6:0 },
        deadlineDate: ''
    };

    // 初始化讀取資料
    function init() {
        const saved = localStorage.getItem('courseTrackerData');
        if (saved) {
            data = JSON.parse(saved);
            document.getElementById('totalEps').value = data.totalEps || '';
            document.getElementById('epDuration').value = data.epDuration || '';
            for(let i=0; i<=6; i++) document.getElementById(`w${i}`).value = data.schedule[`w${i}`] || 0;
            if(data.deadlineDate) document.getElementById('deadlineDate').value = data.deadlineDate;
        }
        updateUI();
    }

    // 儲存資料到手機/瀏覽器
    function saveData() {
        data.totalEps = parseInt(document.getElementById('totalEps').value) || 0;
        data.epDuration = parseInt(document.getElementById('epDuration').value) || 0;
        for(let i=0; i<=6; i++) {
            data.schedule[`w${i}`] = parseInt(document.getElementById(`w${i}`).value) || 0;
        }
        data.deadlineDate = document.getElementById('deadlineDate').value;
        localStorage.setItem('courseTrackerData', JSON.stringify(data));
        updateUI();
    }

    // 增減集數
    function changeEp(amount) {
        if(data.totalEps === 0) return alert("請先設定總集數！");
        data.currentEp += amount;
        if(data.currentEp < 0) data.currentEp = 0;
        if(data.currentEp > data.totalEps) data.currentEp = data.totalEps;
        localStorage.setItem('courseTrackerData', JSON.stringify(data));
        updateUI();
    }

    // 更新畫面顯示
    function updateUI() {
        document.getElementById('currentEp').innerText = data.currentEp;
        document.getElementById('displayTotal').innerText = data.totalEps;
        
        let percent = 0;
        if(data.totalEps > 0) {
            percent = ((data.currentEp / data.totalEps) * 100).toFixed(1);
        }
        document.getElementById('progressBar').style.width = percent + '%';
        document.getElementById('progressPercent').innerText = percent + '%';

        calcWeekly();
        if(data.deadlineDate) calcDeadline();
    }

    // 計算固定每週排程資訊
    function calcWeekly() {
        let weeklyTotal = 0;
        for(let i=0; i<=6; i++) weeklyTotal += data.schedule[`w${i}`];
        
        const today = new Date().getDay(); // 0是週日, 1是週一...
        const todayTarget = data.schedule[`w${today}`];
        const remaining = data.totalEps - data.currentEp;

        let msg = `每週總共會看 <span class="highlight">${weeklyTotal}</span> 集。<br>`;
        if(weeklyTotal > 0 && remaining > 0) {
            let weeksNeeded = Math.ceil(remaining / weeklyTotal);
            msg += `依照這個速度，預計約 <span class="highlight">${weeksNeeded}</span> 週後可以全部看完！<br>`;
        }
        msg += `👉 <b>今天</b> 的進度目標是：看 <span class="highlight" style="color:var(--success)">${todayTarget}</span> 集`;
        
        if(data.epDuration > 0 && todayTarget > 0) {
            msg += ` (約 ${todayTarget * data.epDuration} 分鐘)。`;
        } else {
            msg += `。`;
        }
        document.getElementById('weeklyResult').innerHTML = msg;
    }

    // 計算目標日期規劃資訊
    function calcDeadline() {
        const resultBox = document.getElementById('deadlineResult');
        if(!data.deadlineDate || data.totalEps === 0) {
            resultBox.classList.add('hidden');
            return;
        }
        resultBox.classList.remove('hidden');

        const end = new Date(data.deadlineDate);
        end.setHours(23, 59, 59);
        const now = new Date();
        const diffTime = end - now;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        const remainingEps = data.totalEps - data.currentEp;

        if(remainingEps <= 0) {
            resultBox.innerHTML = `🎉 恭喜！你已經完成所有課程了！`;
            return;
        }

        if(diffDays <= 0) {
            resultBox.innerHTML = `⚠️ 期限已經到了！還剩下 ${remainingEps} 集沒有看完喔。`;
            return;
        }

        const epsPerDay = (remainingEps / diffDays).toFixed(1);
        let msg = `距離目標還有 <span class="highlight">${diffDays}</span> 天，剩餘 ${remainingEps} 集。<br><br>`;
        msg += `📈 系統規劃：<br>每天平均需要看 <span class="highlight">${epsPerDay}</span> 集。`;
        
        if(data.epDuration > 0) {
            const minsPerDay = Math.round(epsPerDay * data.epDuration);
            msg += `<br>⏱️ 換算每天需花費約 <span class="highlight">${minsPerDay}</span> 分鐘觀看。`;
        }
        resultBox.innerHTML = msg;
    }

    // 切換頁籤
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('weeklyPlan').classList.add('hidden');
        document.getElementById('deadlinePlan').classList.add('hidden');
        
        if(tab === 'weekly') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('weeklyPlan').classList.remove('hidden');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('deadlinePlan').classList.remove('hidden');
        }
    }

    // 啟動程式
    window.onload = init;
</script>
</body>
</html>
